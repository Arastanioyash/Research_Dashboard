services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - duckdb_data:/data
    environment:
      - DUCKDB_PATH=${DUCKDB_PATH:-/data/research.duckdb}

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  duckdb_data:
